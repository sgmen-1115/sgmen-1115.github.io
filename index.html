        header h1 {

            margin-bottom: 30px;
        }

            font-weight: bold;
            font-size: 1.1rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        #timer {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        .board {
            text-align: left;
            background: white;
            padding: 20px;
            border-left: 5px solid var(--primary-color);
            margin-bottom: 30px;
            border-radius: 0 5px 5px 0;
        }

        .board h2 {
            margin-top: 0;
            color: var(--primary-color);
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .post {
            border-bottom: 1px solid #eee;
            padding: 15px 0;
        }

        .post-date { font-size: 0.9rem; color: #888; margin-bottom: 5px; }
        .post-title { font-weight: bold; font-size: 1.1rem; }

            margin-top: 50px;
            margin-bottom: 50px;
            display: grid; /* グリッドレイアウト */
            grid-template-columns: repeat(auto-fit, minmax(250px, 1
            fr)); /* スマホにも対応 */
            gap: 20px;
        }

            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            color: var(--primary-color);
            padding: 20px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 2px solid #eee;
        }

        .btn:hover {
            background: var(--primary-color);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,51,102,0.2);
            border-color: var(--primary-color);
        }

        /* フッター */
        footer {
            margin-top: 80px;
            padding: 20px 0;
            color: #888;
            border-top: 1px solid #eee;
        }

<body>

<header>
    <h1>男子部公式サイト</h1>
    <p style="position: relative; z-index: 1;">未来に向けて、共に駆ける。</p>
</header>

<div class="container">

    <div id="countdown-section">
        <div id="countdown-label">男子部結成記念日（7月11日）まで</div>
        <div id="timer">計算中...</div>
    </div>

    <div class="board">
        <h2>お知らせボード</h2>
        
        <div class="post">
            <div class="post-date">2026.04.13</div>
            <div class="post-title">男子部公式サイトをリニューアルしました</div>
            <p>全国の同志の皆さんの活動に役立つ情報を発信していきます。</p>
        </div>
        
    </div>

    <h2>各種リンク</h2>
    <div class="links-section">
        
        <a href="https://sokadisearch.org/" class="btn" target="_blank">
            <span>SOKA DIサーチ</span>
        </a>
        
        <a href="https://goshoshinpan-search.sokanet.jp/" class="btn" target="_blank">
            <span>御書検索</span>
        </a>
        
        <a href="https://www.miraibu.net/" class="btn" target="_blank">
            <span>未来部希望ネット</span>
        </a>
        
    </div>

    <footer>
        <p>&copy; sgmen-1115.github.io. All Rights Reserved.</p>
    </footer>

</div>

<script>
    // カウントダウンの計算ロジック
    function updateTimer() {
        // 現在の日時を取得
        const now = new Date();
        const currentYear = now.getFullYear();
        
        // 今年の7月11日の日時を設定
        let targetDate = new Date(`July 11, ${currentYear} 00:00:00`).getTime();
        
        // もし今年の7月11日がすでに過ぎている場合は、来年の7月11日を設定
        if (now.getTime() > targetDate) {
            targetDate = new Date(`July 11, ${currentYear + 1} 00:00:00`).getTime();
        }

        const distance = targetDate - now.getTime();

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        if (distance < 0) {
            document.getElementById("timer").innerHTML = "祝・男子部結成記念日！";
        } else {
            document.getElementById("timer").innerHTML = days + "日 " + hours + "時間 " + minutes + "分 " + seconds + "秒 ";
        }
    }
    // 1秒ごとに更新
    setInterval(updateTimer, 1000);
    // ページロード時に初回実行
    updateTimer();
</script>
