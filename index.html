<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="日頃の活動をサポートする公式ページです。" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="創価学会男子部公式サイト" />
  <meta property="og:description" content="日頃の活動をサポートする公式ページです。" />
  <meta property="og:url" content="https://sgmen-1115.github.io/" />
  <meta property="og:image" content="https://sgmen-1115.github.io/ogp.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="創価学会男子部公式サイト" />
  <meta name="twitter:description" content="日頃の活動をサポートする公式ページです。" />
  <meta name="twitter:image" content="https://sgmen-1115.github.io/ogp.jpg" />

  <link rel="manifest" href="/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="男子部アプリ" />
  <link rel="apple-touch-icon" href="icon-192★.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --primary-color: #003366;
      --white: #ffffff;
      --header-h: 56px;
      --tab-h: 64px;
      --text-blue: #17325f;
      --hero-image: url("title_pic.jpg");
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding-top: var(--header-h);
      color: var(--text-blue);
      font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
      background: linear-gradient(180deg, #7ca2ef 0%, #4f78cc 48%, #2d4ea1 100%);
      background-attachment: fixed;
    }

    .fixed-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: var(--header-h);
      z-index: 3000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: rgba(25, 42, 92, 0.22);
      backdrop-filter: blur(8px);
    }

    .fixed-header h1 {
      margin: 0;
      font-family: "Cinzel", serif;
      font-size: clamp(0.76rem, 1.7vw, 0.95rem);
      font-weight: 600;
      letter-spacing: 0.1em;
      line-height: 1;
      color: rgba(245, 249, 255, 0.95);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tab-menu {
      position: sticky;
      top: var(--header-h);
      z-index: 2500;
      height: var(--tab-h);
      margin: 0 auto;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      width: min(1440px, calc(100% - 24px));
      background: rgba(25, 42, 92, 0.22);
      backdrop-filter: blur(8px);
      border-radius: 0 0 22px 22px;
    }

    .tab-menu .tab-link {
      flex: 1 1 0;
      min-width: 0;
      min-height: 42px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.26);
      background: rgba(255, 255, 255, 0.08);
      color: rgba(245, 249, 255, 0.9);
      font-weight: 700;
      font-size: 0.95rem;
      line-height: 1.1;
      padding: 8px 10px;
      cursor: pointer;
    }

    .tab-menu .tab-link.active {
      background: rgba(255, 255, 255, 0.24);
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.42);
    }

    .tab-content {
      display: none;
      position: relative;
      padding: 20px 16px 40px;
      min-height: calc(100vh - (var(--header-h) + var(--tab-h)));
    }

    .tab-content.active { display: block; }

    .tab-content:not(#home)::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 14%, rgba(255,255,255,0.18), rgba(255,255,255,0) 30%),
        radial-gradient(circle at 84% 12%, rgba(255,255,255,0.10), rgba(255,255,255,0) 26%),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.06) 0,
          rgba(255,255,255,0.06) 1px,
          transparent 1px,
          transparent 26px
        );
      opacity: 0.55;
      pointer-events: none;
    }

    .tab-content:not(#home) > * {
      position: relative;
      z-index: 1;
    }

    .page-visual {
      position: relative;
      min-height: calc(100vh - (var(--header-h) + var(--tab-h)));
      margin: 0;
      padding: 0;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(25,59,143,0.20) 0%, rgba(25,59,143,0.55) 100%),
        var(--hero-image) center bottom / cover no-repeat;
    }

    .page-visual::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 16% 20%, rgba(255,255,255,0.22), transparent 25%),
        radial-gradient(circle at 84% 16%, rgba(210,230,255,0.16), transparent 24%);
      pointer-events: none;
    }

    .hero-container { position: relative; min-height: 58vh; }

    .hero-content {
      position: absolute;
      top: 26px;
      left: 0;
      right: 0;
      z-index: 20;
      padding: 0 20px;
      max-width: 980px;
      margin: 0 auto;
    }

    .hero-title {
      margin: 0;
      font-size: clamp(1.8rem, 3.7vw, 3rem);
      line-height: 1.35;
      letter-spacing: 0.03em;
      color: #f5f9ff;
      font-weight: 500;
      text-shadow: 0 2px 10px rgba(5,20,60,0.35), 0 0 28px rgba(186,214,255,0.28);
    }

    .hero-title::after {
      content: "";
      display: block;
      width: clamp(120px, 20vw, 220px);
      height: 2px;
      margin-top: 16px;
      background: linear-gradient(90deg, rgba(255,255,255,0.85), rgba(255,255,255,0.08));
      border-radius: 999px;
    }

    .hero-title rt {
      font-size: 0.45em;
      letter-spacing: 0;
    }

    .card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.3);
      margin-bottom: 20px;
      color: #17325f;
    }

    #home .card {
      background: linear-gradient(180deg, rgba(27,57,128,0.58), rgba(18,41,98,0.52));
      border: 1px solid rgba(190,215,255,0.28);
      box-shadow: 0 10px 30px rgba(9,26,71,0.28);
      color: #fff;
      margin-top: -12px;
      position: relative;
      z-index: 8;
    }

    .sub-title {
      display: inline-block;
      background-color: var(--primary-color);
      color: var(--white);
      padding: 6px 20px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: bold;
      margin: 15px 0 10px 0;
    }

    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      margin: 20px 0;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .video-container iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .shorts-row {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 6px 2px 10px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .shorts-card {
      position: relative;
      flex: 0 0 min(220px, 62vw);
      aspect-ratio: 9 / 16;
      border: 0;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
      padding: 0;
      cursor: pointer;
      scroll-snap-align: start;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
    }

    .shorts-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .shorts-play {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 58px;
      height: 58px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 24px;
    }

    .shorts-card iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    @media (max-width: 768px) {
      .fixed-header {
        padding: 0 12px;
      }

      .fixed-header h1 {
        font-size: 0.72rem;
        letter-spacing: 0.08em;
      }

      .tab-menu {
        width: 100%;
        padding: 8px;
        gap: 6px;
        border-radius: 0;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        align-items: stretch;
        overflow: hidden;
        height: auto;
      }

      .tab-menu .tab-link {
        width: 100%;
        min-width: 0;
        min-height: 40px;
        font-size: 12px;
        padding: 7px 4px;
        white-space: normal;
        word-break: keep-all;
        text-align: center;
      }

      .shorts-card {
        flex-basis: 72vw;
      }
    }
  </style>
</head>

<body>
  <div class="fixed-header">
    <h1>SOKA Men's Division Official</h1>
  </div>

  <div class="tab-menu">
    <button class="tab-link active" onclick="openTab(event, 'home')">ホーム</button>
    <button class="tab-link" onclick="openTab(event, 'videos')">動画</button>
    <button class="tab-link" onclick="openTab(event, 'study')">学習</button>
  </div>

  <div id="home" class="tab-content active">
    <div class="page-visual">
      <div class="hero-container">
        <div class="hero-content">
          <div style="font-size:0.8rem; letter-spacing:3px; margin-bottom:8px; font-weight:bold; color:#dbe9ff;">
            MEN'S DIVISION
          </div>
          <h2 class="hero-title">答えは、僕の<ruby>生命<rt>なか</rt></ruby>にある。</h2>
        </div>
      </div>

      <div style="padding:20px; max-width:800px; margin:0 auto;">
        <div class="card" style="text-align:center;">
          <span style="font-size:0.8rem; color:rgba(255,255,255,0.75);">7.11 男子部結成記念日まで</span>
          <div id="timer" style="font-size:1.8rem; font-weight:bold; color:#fff;">計算中...</div>
        </div>

        <div class="sub-title">注目動画</div>
        <div class="video-container">
          <iframe src="https://www.youtube.com/embed/WORGpCGs3GY?start=483" allowfullscreen></iframe>
        </div>
      </div>
    </div>
  </div>

  <div id="videos" class="tab-content">
    <div class="sub-title">動画（Shorts）</div>
    <div class="card">
      <div class="shorts-row">
        <button class="shorts-card js-short" data-id="IkYfUuDlCUM" aria-label="動画1">
          <img src="https://i.ytimg.com/vi_webp/IkYfUuDlCUM/hqdefault.webp" alt="動画1" />
          <span class="shorts-play">▶</span>
        </button>

        <button class="shorts-card js-short" data-id="boA5kFqggE8" aria-label="動画2">
          <img src="https://i.ytimg.com/vi_webp/boA5kFqggE8/hqdefault.webp" alt="動画2" />
          <span class="shorts-play">▶</span>
        </button>

        <button class="shorts-card js-short" data-id="r_lZPLBDyHM" aria-label="動画3">
          <img src="https://i.ytimg.com/vi_webp/r_lZPLBDyHM/hqdefault.webp" alt="動画3" />
          <span class="shorts-play">▶</span>
        </button>

        <button class="shorts-card js-short" data-id="xsrxm140q2E" aria-label="動画4">
          <img src="https://i.ytimg.com/vi_webp/xsrxm140q2E/hqdefault.webp" alt="動画4" />
          <span class="shorts-play">▶</span>
        </button>

        <button class="shorts-card js-short" data-id="DTM88cfE85c" aria-label="動画5">
          <img src="https://i.ytimg.com/vi_webp/DTM88cfE85c/hqdefault.webp" alt="動画5" />
          <span class="shorts-play">▶</span>
        </button>
      </div>
    </div>
  </div>

  <div id="study" class="tab-content">
    <div class="sub-title">学習資料</div>
    <div class="card"
         onclick="window.open('https://drive.google.com/file/d/1NJCwgHrD-JLD7l80Odaik3RbFV5uXNcm/view', '_blank')"
         style="cursor:pointer; display:flex; align-items:center; padding:15px;">
      <div style="background:#ffebee; color:#c62828; width:45px; height:45px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:bold; margin-right:15px;">PDF</div>
      <div style="flex-grow:1;"><strong>創価の源流 大東京（上）</strong></div>
      <div style="color:#ccc;">❯</div>
    </div>
  </div>

  <script>
    function openTab(evt, tabId) {
      document.querySelectorAll(".tab-content").forEach((el) => el.classList.remove("active"));
      document.querySelectorAll(".tab-link").forEach((el) => el.classList.remove("active"));

      const target = document.getElementById(tabId);
      if (target) target.classList.add("active");
      if (evt && evt.currentTarget) evt.currentTarget.classList.add("active");
    }

    function updateCountdown() {
      const now = new Date();
      const thisYear = new Date(now.getFullYear(), 6, 11, 0, 0, 0, 0);
      const target = now <= thisYear ? thisYear : new Date(now.getFullYear() + 1, 6, 11, 0, 0, 0, 0);
      const diff = target.getTime() - now.getTime();

      const d = Math.floor(diff / (1000 * 60 * 60 * 24));
      const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((diff % (1000 * 60)) / 1000);

      const el = document.getElementById("timer");
      if (el) el.textContent = d + "日 " + h + "時 " + m + "分 " + s + "秒";
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    document.querySelectorAll(".js-short").forEach((el) => {
      el.addEventListener("click", () => {
        const id = el.dataset.id;
        const iframe = document.createElement("iframe");
        iframe.src = "https://www.youtube.com/embed/" + id + "?autoplay=1&playsinline=1&rel=0";
        iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
        iframe.allowFullscreen = true;
        el.innerHTML = "";
        el.appendChild(iframe);
      }, { once: true });
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js", { scope: "/" })
          .then((reg) => console.log("ServiceWorker registered:", reg))
          .catch((err) => console.error("SW registration failed:", err));
      });
    }
  </script>
</body>
</html>
