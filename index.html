<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>男子部結成記念日 サポートサイト</title>
    <style>
        /* デザインのこだわり設定 */
        :root {
            --primary-color: #003366; /* 誠実な紺色 */
            --accent-color: #e67e22;  /* 情熱のオレンジ */
            --bg-color: #f8f9fa;
        }

        body {
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        header {
            background: var(--primary-color);
            color: white;
            padding: 40px 0;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* カウントダウンのデザイン */
        .countdown-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        #timer {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--accent-color);
        }

        /* 掲示板のデザイン */
        .board {
            text-align: left;
            background: white;
            padding: 20px;
            border-left: 5px solid var(--primary-color);
            margin-bottom: 30px;
        }

        .post {
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }

        .post-date { font-size: 0.8rem; color: #888; }
        .post-admin { font-weight: bold; color: var(--primary-color); }

        /* デザインボタン */
        .btn {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(0,51,102,0.3);
        }

        .btn:hover {
            background: #004080;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<header>
    <h1>男子部結成記念日サポート</h1>
    <p>7.11 勝利を目指して</p>
</header>

<div class="container">

    <div class="countdown-container">
        <h2>7.11 まであと...</h2>
        <div id="timer">計算中...</div>
    </div>

    <div class="board">
        <h2>中央幹部からの発信</h2>
        <div class="post">
            <div class="post-date">2026.04.13</div>
            <div class="post-admin">【本部より】</div>
            <p>全国の同志の皆さん、本日よりカウントダウンサイトを開設しました！</p>
        </div>
    </div>

    <div style="margin-top: 50px;">
        <a href="https://sokadisearch.org/" class="btn" target="_blank">Soka Search へアクセス</a>
    </div>

</div>

<script>
    // カウントダウンの計算ロジック
    function updateTimer() {
        const targetDate = new Date('July 11, 2026 00:00:00').getTime();
        const now = new Date().getTime();
        const distance = targetDate - now;

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        if (distance < 0) {
            document.getElementById("timer").innerHTML = "祝・男子部結成記念日！";
        } else {
            document.getElementById("timer").innerHTML = days + "日 " + hours + "時間 " + minutes + "分 " + seconds + "秒 ";
        }
    }
    setInterval(updateTimer, 1000);
    updateTimer();
</script>

</body>
</html>
