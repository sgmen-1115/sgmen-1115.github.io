<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex"> 
    <title>男子部公式サイト</title>

<style>
    /* --- 基本設定 --- */
    :root {
        --primary-color: #003366;
        --accent-color: #f39c12;
        --bg-color: #f8f9fa;
        --tab-bg-darker: #dce4ec;
        --white: #ffffff;
    }

    body {
        font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
        margin: 0;
        padding: 0;
        background-color: var(--bg-color);
        color: #333;
        background-image: radial-gradient(#d1d9e6 1px, transparent 1px);
        background-size: 20px 20px;
    }

    /* --- タブメニュー --- */
    .tab-menu {
        position: sticky;
        top: 0;
        width: 100%;
        background: var(--tab-bg-darker);
        display: flex;
        justify-content: space-around;
        z-index: 1000;
        border-bottom: 1px solid #c0c9d1;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .tab-btn {
        flex: 1;
        padding: 16px 0;
        border: none;
        background: none;
        font-weight: bold;
        color: #556677;
        cursor: pointer;
        font-size: 0.95rem;
        position: relative;
        transition: all 0.3s ease;
    }

    .tab-btn.active {
        background: var(--white);
        color: var(--primary-color);
    }

    .tab-btn.active::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 4px;
        background-color: var(--accent-color);
    }

    header {
        background: white;
        color: var(--primary-color);
        padding: 15px 0;
        text-align: center;
        border-bottom: 1px solid #eee;
    }
    header h1 { font-size: 1.2rem; margin: 0; letter-spacing: 2px; }

    /* --- メインビジュアル（東京タワー・清潔感） --- */
    .hero-container {
        position: relative;
        width: 100%;
        height: 65vh;
        /* 清潔感のある東京タワーの写真へ変更 */
        background: linear-gradient(rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.3)), 
                    url('https://images.unsplash.com/photo-1542931287-023b922fa89b?auto=format&fit=crop&w=1200&q=80');
        background-size: cover;
        background-position: center;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 0 0 50px 50px;
        overflow: hidden;
    }

    .hero-content {
        text-align: center;
        background: rgba(255, 255, 255, 0.6); 
        padding: 35px 20px;
        border-radius: 30px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        width: 80%;
    }

    .hero-main-copy { font-size: 1.5rem; line-height: 1.6; color: #1a1a1a; margin: 0; font-weight: bold; }

    /* --- 動画・リンクのデザイン調整 --- */
    .video-container {
        position: relative;
        padding-bottom: 56.25%;
        margin: 30px auto; /* 中央揃え */
        width: 95%; /* サイズを大きく */
        max-width: 700px;
        border-radius: 15px;
        overflow: hidden;
        box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

    .btn {
        display: block;
        background: var(--white);
        color: var(--primary-color);
        padding: 18px;
        margin: 15px 0;
        text-decoration: none;
        border-radius: 12px;
        font-weight: bold;
        border: 1px solid #e0e6ed;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        transition: 0.3s;
    }
    .btn:hover { background: #f0f4f8; transform: translateY(-2px); }

    /* --- その他共通パーツ --- */
    .tab-content { display: none; padding: 20px; max-width: 800px; margin: 0 auto; animation: fadeIn 0.4s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    .card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); padding: 25px; border-radius: 20px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05); border: 1px solid rgba(255, 255, 255, 0.3); margin-bottom: 25px; }
    .sub-title { display: inline-block; background-color: var(--primary-color); color: var(--white); padding: 8px 25px; border-radius: 50px; font-size: 0.9rem; font-weight: bold; margin: 20px 0 15px 0; }

    .oumi-btn { display: flex; align-items: center; justify-content: center; background-color: #ffffff; color: #333; padding: 15px 30px; border-radius: 50px; font-weight: bold; text-decoration: none; position: relative; border: 1px solid #ddd; cursor: pointer; transition: 0.3s; }
    .oumi-btn::after { content: "→"; position: absolute; right: 15px; width: 32px; height: 32px; background-color: #79bede; color: #ffffff; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

    #timer { font-size: 2.2rem; font-weight: bold; color: var(--primary-color); text-align: center; }
    .schedule-item { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #f0f0f0; text-decoration: none; color: inherit; }
    .schedule-date { font-weight: bold; color: var(--primary-color); min-width: 90px; }
</style>
</head>
<body>

<nav class="tab-menu">
    <button class="tab-btn active" onclick="openTab(event, 'home')">ホーム</button>
    <button class="tab-btn" onclick="openTab(event, 'schedule')">スケジュール</button>
    <button class="tab-btn" onclick="openTab(event, 'action')">取り組み</button>
    <button class="tab-btn" onclick="openTab(event, 'study')">学習</button>
</nav>

<header>
    <h1>男子部公式サイト</h1>
</header>

<div id="home" class="tab-content active" style="padding: 0; max-width: 100%;">
    <div class="hero-container">
        <div class="hero-content">
            <div style="font-size: 0.9rem; letter-spacing: 4px; color: var(--primary-color); margin-bottom: 10px; font-weight: bold;">SGMEN TOKYO</div>
            <h2 class="hero-main-copy">開拓の精神で、<br>新しい東京の未来を。</h2>
        </div>
    </div>

    <div style="padding: 0 20px; max-width: 800px; margin: 0 auto;">
        <div class="card" style="margin-top: -40px; position: relative; z-index: 10; text-align: center; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.15);">
            <span style="font-weight: bold; color: #666; font-size: 0.85rem;">7.11 男子部結成記念日まで</span>
            <div id="timer">計算中...</div>
        </div>

        <div class="sub-title">お知らせ</div>
        <div class="card">
            <p><strong>2026.04.14</strong><br>公式サイトのホーム画面をより清潔感のあるデザインにリニューアルしました。</p>
        </div>

        <div class="sub-title">注目動画</div>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/WORGpCGs3GY?start=483" frameborder="0" allowfullscreen></iframe>
        </div>

        <div class="sub-title">クイックリンク</div>
        <a href="https://sokadisearch.org/" class="btn" target="_blank">SOKA DIサーチ</a>
        <a href="https://goshoshinpan-search.sokanet.jp/" class="btn" target="_blank">御書検索</a>
    </div>
</div>

<div id="schedule" class="tab-content">
    <div class="sub-title">活動スケジュール</div>
    <div class="card">
        <a href="https://www.google.com/calendar/render?action=TEMPLATE&text=男子部座談会" target="_blank" class="schedule-item">
            <span><span class="schedule-date">4/20（月）</span> 男子部座談会</span>
            <span style="font-size: 0.75rem; color: #e67e22; border: 1px solid #f39c12; padding: 3px 10px; border-radius: 6px;">+ カレンダー</span>
        </a>
    </div>
</div>

<div id="action" class="tab-content">
    <div class="sub-title">唱題チャレンジ</div>
    <div class="card" style="text-align: center;">
        <div id="timer-display" style="font-size: 3rem; margin: 10px 0;">00:00:00</div>
        <div id="session-count" style="font-size: 1.2rem; color: #79bede; margin-bottom: 20px;">0 遍</div>
        <button id="startBtn" class="oumi-btn" style="width: 100%; max-width: 300px; background: var(--primary-color); color: white; margin: 0 auto 10px;">スタート</button>
        <button id="resetBtn" class="oumi-btn" style="width: 100%; max-width: 300px; margin: 0 auto;">リセット</button>
        <button id="saveBtn" class="oumi-btn" onclick="saveData()" style="width: 100%; max-width: 300px; display: none; margin: 10px auto; background: #fffde7;">保存する</button>
    </div>
</div>

<div id="study" class="tab-content">
    <div class="sub-title">資料ライブラリ</div>
    <div class="card" onclick="window.open('https://drive.google.com/file/d/1NJCwgHrD-JLD7l80Odaik3RbFV5uXNcm/view', '_blank')" style="cursor:pointer; display: flex; align-items: center;">
        <div style="background: #ffebee; color: #c62828; padding: 10px; border-radius: 8px; margin-right: 15px;">PDF</div>
        <div><strong>創価の源流 大東京（上）</strong></div>
    </div>
</div>

<script type="module">
    // Firebase関連のスクリプト（以前のまま維持）
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCFEUoUyWhz8Qlr2Z261LOlzwe7BIQQTx4",
        authDomain: "sgmen-db.firebaseapp.com",
        databaseURL: "https://sgmen-db-default-rtdb.firebaseio.com",
        projectId: "sgmen-db",
        storageBucket: "sgmen-db.firebasestorage.app",
        messagingSenderId: "968577713228",
        appId: "1:968577713228:web:23eaf381b4be6db1fa60e9"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const userRef = ref(db, 'users/my-test-user');

    let startTime, timerInterval, elapsedTime = 0, isRunning = false;
    const display = document.getElementById('timer-display');
    const sessionDisplay = document.getElementById('session-count');
    const startBtn = document.getElementById('startBtn');
    const saveBtn = document.getElementById('saveBtn');

    startBtn.onclick = () => {
        if (!isRunning) {
            isRunning = true;
            startBtn.innerText = "ストップ";
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const diff = Date.now() - startTime + elapsedTime;
                const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                display.innerText = `${h}:${m}:${s}`;
                sessionDisplay.innerText = `${Math.floor(diff / 1500)} 遍`;
            }, 100);
            saveBtn.style.display = "none";
        } else {
            isRunning = false;
            startBtn.innerText = "再開";
            clearInterval(timerInterval);
            elapsedTime += Date.now() - startTime;
            if (elapsedTime >= 1500) saveBtn.style.display = "block";
        }
    };

    document.getElementById('resetBtn').onclick = () => {
        if(confirm("リセットしますか？")) {
            clearInterval(timerInterval);
            isRunning = false;
            elapsedTime = 0;
            display.innerText = "00:00:00";
            sessionDisplay.innerText = "0 遍";
            startBtn.innerText = "スタート";
            saveBtn.style.display = "none";
        }
    };

    window.saveData = async () => {
        const sessionCount = Math.floor(elapsedTime / 1500);
        try {
            const snapshot = await get(userRef);
            const data = snapshot.val() || { total: 0, totalMs: 0 };
            await update(userRef, {
                total: (data.total || 0) + sessionCount,
                totalMs: (data.totalMs || 0) + elapsedTime
            });
            alert("保存しました！");
            location.reload();
        } catch (e) { alert("エラー"); }
    };
</script>

<script>
    function openTab(evt, tabName) {
        var i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) { tabcontent[i].classList.remove("active"); }
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) { tablinks[i].classList.remove("active"); }
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
        window.scrollTo(0, 0);
    }

    function updateTimer() {
        const now = new Date();
        const targetDate = new Date(`July 11, ${now.getFullYear()} 00:00:00`).getTime();
        let distance = targetDate - now.getTime();
        if (distance < 0) { distance = new Date(`July 11, ${now.getFullYear() + 1} 00:00:00`).getTime() - now.getTime(); }
        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);
        document.getElementById("timer").innerHTML = days + "日 " + hours + "時 " + minutes + "分 " + seconds + "秒 ";
    }
    setInterval(updateTimer, 1000);
    updateTimer();
</script>

</body>
</html>
