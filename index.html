<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex"> 
    <title>男子部公式サイト</title>

<style>
    :root {
        --primary-color: #003366;
        --accent-color: #f39c12;
        --bg-color: #f8f9fa;
        --tab-bg-darker: #dce4ec;
        --white: #ffffff;
        --header-height: 60px;
        --tab-height: 50px;
    }

    body {
        font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
        margin: 0;
        padding-top: calc(var(--header-height) + var(--tab-height));
        background-color: var(--bg-color);
        color: #333;
        background-image: radial-gradient(#d1d9e6 1px, transparent 1px);
        background-size: 20px 20px;
    }

    /* --- 固定ヘッダー --- */
    .fixed-header {
        position: fixed;
        top: 0; left: 0; width: 100%; height: var(--header-height);
        background: white;
        display: flex; align-items: center; justify-content: center;
        border-bottom: 1px solid #eee; z-index: 2000;
    }

    .fixed-header h1 { font-size: 1rem; margin: 0; color: var(--primary-color); text-align: center; }

    .settings-btn {
        position: absolute; right: 15px; background: var(--bg-color);
        border: 1px solid #ddd; border-radius: 8px; width: 36px; height: 36px;
        display: flex; align-items: center; justify-content: center; cursor: pointer;
    }

    /* --- 固定タブメニュー --- */
    .tab-menu {
        position: fixed; top: var(--header-height); left: 0; width: 100%;
        height: var(--tab-height); background: var(--tab-bg-darker);
        display: flex; justify-content: space-around; z-index: 1000;
        border-bottom: 1px solid #c0c9d1;
    }

    .tab-btn {
        flex: 1; border: none; background: none; font-weight: bold;
        color: #556677; cursor: pointer; font-size: 0.75rem; position: relative; height: 100%;
    }

    .tab-btn.active { background: var(--white); color: var(--primary-color); }
    .tab-btn.active::after {
        content: ""; position: absolute; bottom: 0; left: 0; width: 100%;
        height: 4px; background-color: var(--accent-color);
    }

    /* --- コンテンツ --- */
    .tab-content { display: none; padding: 20px; max-width: 800px; margin: 0 auto; animation: fadeIn 0.4s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    .card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05); border: 1px solid rgba(255, 255, 255, 0.3); margin-bottom: 20px; }
    .sub-title { display: inline-block; background-color: var(--primary-color); color: var(--white); padding: 6px 20px; border-radius: 50px; font-size: 0.85rem; font-weight: bold; margin: 15px 0 10px 0; }

    .goal-textarea {
        width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd;
        font-family: inherit; font-size: 0.95rem; box-sizing: border-box; margin-bottom: 10px;
    }

    .hero-container {
        position: relative; width: 100%; height: 50vh;
        background: linear-gradient(rgba(255,255,255,0.1), rgba(255,255,255,0.3)), 
                    url('https://images.unsplash.com/photo-1542931287-023b922fa89b?auto=format&fit=crop&w=1200&q=80');
        background-size: cover; background-position: center;
        display: flex; justify-content: center; align-items: center;
        border-radius: 0 0 40px 40px; overflow: hidden;
    }
    .hero-content {
        text-align: center; background: rgba(255,255,255,0.6); 
        padding: 25px 15px; border-radius: 25px; backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.5); width: 85%;
    }

    .video-container { position: relative; padding-bottom: 56.25%; margin: 20px 0; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    
    .oumi-btn { display: flex; align-items: center; justify-content: center; background-color: var(--primary-color); color: white; padding: 15px; border-radius: 50px; font-weight: bold; border: none; cursor: pointer; width: 100%; }

    #settings-modal {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.6); z-index: 3000; align-items: center; justify-content: center;
    }
    .modal-content { background: white; padding: 25px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; }
    .modal-content input, .modal-content select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }

    .area-content { display: none; }
</style>
</head>
<body>

<div class="fixed-header">
    <h1>創価学会東京男子部公式サイト</h1>
    <div class="settings-btn" onclick="toggleSettings()">⚙️</div>
</div>

<nav class="tab-menu">
    <button class="tab-btn active" onclick="openTab(event, 'home')">ホーム</button>
    <button class="tab-btn" onclick="openTab(event, 'schedule')">予定</button>
    <button class="tab-btn" onclick="openTab(event, 'everyone')">みんなの挑戦</button>
    <button class="tab-btn" onclick="openTab(event, 'mine')">私の挑戦</button>
    <button class="tab-btn" onclick="openTab(event, 'study')">学習</button>
</nav>

<div id="settings-modal">
    <div class="modal-content">
        <h3>プロフィール設定</h3>
        <p style="font-size:0.75rem; color:#666;">ユーザー名は一度設定すると変更できません。パソコンと同じ名前を入れれば同期されます。</p>
        <input type="text" id="input-username" placeholder="ユーザー名を入力">
        
        <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
        
        <select id="select-houmen" onchange="updateSoukuList()">
            <option value="">方面を選択してください</option>
            <option value="tokyo">東京</option>
            <option value="dai2tokyo">第二総東京</option>
            </select>
        <select id="select-souku">
            <option value="">先に方面を選択してください</option>
        </select>
        <button id="save-settings-btn" class="oumi-btn" style="margin-top:15px;">設定を保存</button>
        <p onclick="toggleSettings()" style="margin-top:15px; font-size:0.8rem; color:#999; cursor:pointer;">キャンセル</p>
    </div>
</div>

<div id="home" class="tab-content active" style="padding:0; max-width:100%;">
    <div class="hero-container">
        <div class="hero-content">
            <div style="font-size: 0.8rem; letter-spacing: 3px; color: var(--primary-color); margin-bottom: 8px; font-weight: bold;">TOKYO MEN'S DIVISION</div>
            <h2 style="font-size: 1.3rem; margin:0;">自分が変われば、街が変わる。<br>新しい東京の未来を。</h2>
        </div>
    </div>
    <div style="padding: 20px; max-width:800px; margin: 0 auto;">
        <div class="card" style="margin-top: -40px; text-align: center;">
            <span style="font-size: 0.8rem; color: #666;">7.11 男子部結成記念日まで</span>
            <div id="timer" style="font-size: 1.8rem; font-weight: bold; color: var(--primary-color);">計算中...</div>
        </div>
    </div>
</div>

<div id="schedule" class="tab-content">
    <div class="sub-title">活動スケジュール</div>
    <div class="card" id="sched-default">地域を設定してください</div>
    <div id="sched-tokyo-新宿総区" class="area-content card">4/20 男子部座談会</div>
</div>

<div id="everyone" class="tab-content">
    <div class="sub-title">地域の取り組み</div>
    <div class="card" id="action-default">地域を設定してください</div>
    <div id="action-tokyo-新宿総区" class="area-content card">
        <h3 style="color: var(--primary-color);">新宿総区の指標</h3>
        <p>1. 伝統の新宿！勝利の対話拡大</p>
    </div>
</div>

<div id="mine" class="tab-content">
    <div class="sub-title">目標設定</div>
    <div class="card">
        <textarea id="my-goal-input" class="goal-textarea" rows="3" placeholder="目標を入力"></textarea>
        <button class="oumi-btn" onclick="saveMyGoal()" style="padding: 10px;">保存</button>
    </div>

    <div class="sub-title">唱題チャレンジ</div>
    <div class="card" style="text-align: center;">
        <p id="user-display-name" style="font-size:0.8rem; color:var(--primary-color); font-weight:bold;"></p>
        <div style="display: flex; justify-content: space-around; margin-bottom: 20px; background: #f0f7ff; padding: 15px; border-radius: 12px;">
            <div><div style="font-size: 0.7rem;">累計遍数</div><div id="total-count" style="font-weight:bold;">0 遍</div></div>
            <div><div style="font-size: 0.7rem;">累計時間</div><div id="total-time" style="font-weight:bold;">0:00</div></div>
        </div>
        <div id="timer-display" style="font-size: 3rem; font-weight: 300; margin: 10px 0;">00:00:00</div>
        <div id="session-count" style="font-size: 1rem; color: #79bede; margin-bottom: 20px;">0 遍</div>
        <button id="startBtn" class="oumi-btn">スタート</button>
        <button id="saveBtn" class="oumi-btn" style="display: none; background-color: #f39c12; margin-top:10px;">記録を保存</button>
    </div>
</div>

<div id="study" class="tab-content">
    <div class="sub-title">学習資料</div>
    <div class="card">資料は順次追加されます</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, set, update, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCFEUoUyWhz8Qlr2Z261LOlzwe7BIQQTx4",
        authDomain: "sgmen-db.firebaseapp.com",
        databaseURL: "https://sgmen-db-default-rtdb.firebaseio.com",
        projectId: "sgmen-db",
        storageBucket: "sgmen-db.firebasestorage.app",
        messagingSenderId: "968577713228",
        appId: "1:968577713228:web:23eaf381b4be6db1fa60e9"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentUsername = localStorage.getItem('sokaUsername');
    let userRef = currentUsername ? ref(db, 'users/' + currentUsername) : null;

    // --- 設定保存ロジック（重複チェック付き） ---
    document.getElementById('save-settings-btn').onclick = async () => {
        const inputName = document.getElementById('input-username').value.trim();
        const selectedArea = document.getElementById('select-souku').value;

        if (!inputName) { alert("ユーザー名を入力してください"); return; }
        
        // 初めて登録する場合、または名前が変わった場合のチェック
        if (inputName !== currentUsername) {
            const checkRef = ref(db, 'users/' + inputName);
            const snapshot = await get(checkRef);
            
            if (snapshot.exists() && !currentUsername) {
                // 他人が既に使っている（かつ自分がまだログインしていない）場合
                alert("このユーザー名は既に他の人が使用しています。別の名前を試してください。");
                return;
            } else if (!snapshot.exists()) {
                // 新規登録
                await set(checkRef, { total: 0, totalMs: 0, createdAt: Date.now() });
            }
            // 既存ユーザーとして入る場合はそのまま
        }

        localStorage.setItem('sokaUsername', inputName);
        localStorage.setItem('userArea', selectedArea);
        location.reload(); // ページをリロードして反映
    };

    // --- 唱題チャレンジロジック ---
    if (userRef) {
        document.getElementById('user-display-name').innerText = `利用者: ${currentUsername}`;
        onValue(userRef, (snapshot) => {
            const data = snapshot.val() || { total: 0, totalMs: 0 };
            document.getElementById('total-count').innerText = (data.total || 0).toLocaleString() + " 遍";
            const h = Math.floor(data.totalMs / 3600000);
            const m = Math.floor((data.totalMs % 3600000) / 60000);
            document.getElementById('total-time').innerText = `${h}:${m.toString().padStart(2, '0')}`;
        });
    } else {
        document.getElementById('user-display-name').innerText = "⚙️設定からユーザー名を登録してください";
    }

    let startTime, timerInterval, elapsedTime = 0, isRunning = false;
    const startBtn = document.getElementById('startBtn');
    const display = document.getElementById('timer-display');
    const saveBtn = document.getElementById('saveBtn');

    startBtn.onclick = () => {
        if (!userRef) { toggleSettings(); return; }
        if (!isRunning) {
            isRunning = true; startBtn.innerText = "ストップ";
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const diff = Date.now() - startTime + elapsedTime;
                display.innerText = new Date(diff).toISOString().substr(11, 8);
                document.getElementById('session-count').innerText = `${Math.floor(diff / 1500)} 遍`;
            }, 100);
            saveBtn.style.display = "none";
        } else {
            isRunning = false; startBtn.innerText = "再開";
            clearInterval(timerInterval);
            elapsedTime += Date.now() - startTime;
            if (elapsedTime >= 1500) saveBtn.style.display = "block";
        }
    };

    window.saveData = async () => {
        const sessionCount = Math.floor(elapsedTime / 1500);
        const snapshot = await get(userRef);
        const data = snapshot.val() || { total: 0, totalMs: 0 };
        await update(userRef, {
            total: (data.total || 0) + sessionCount,
            totalMs: (data.totalMs || 0) + elapsedTime
        });
        alert("保存しました！");
        location.reload();
    };
</script>

<script>
    // --- UI制御（方面・タブなど） ---
    const soukuData = {
        'tokyo': ['新宿総区', '港総区', '千代田区'],
        'dai2tokyo': ['武蔵野総区', '八王子総区']
        // 他の方面データ...
    };

    function toggleSettings() {
        const modal = document.getElementById('settings-modal');
        modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        const savedName = localStorage.getItem('sokaUsername');
        if(savedName) document.getElementById('input-username').value = savedName;
    }

    function updateSoukuList() {
        const houmen = document.getElementById('select-houmen').value;
        const soukuSelect = document.getElementById('select-souku');
        soukuSelect.innerHTML = '<option value="">総区を選択してください</option>';
        if (soukuData[houmen]) {
            soukuData[houmen].forEach(name => {
                const opt = document.createElement('option');
                opt.value = houmen + '-' + name; opt.innerText = name;
                soukuSelect.appendChild(opt);
            });
        }
    }

    function openTab(evt, tabName) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabName).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    function applyAreaSettings(areaKey) {
        document.querySelectorAll('.area-content').forEach(el => el.style.display = 'none');
        const s = document.getElementById('sched-' + areaKey); if(s) s.style.display = 'block';
        const a = document.getElementById('action-' + areaKey); if(a) a.style.display = 'block';
        if(s) document.getElementById('sched-default').style.display = 'none';
        if(a) document.getElementById('action-default').style.display = 'none';
    }

    window.onload = () => {
        const savedArea = localStorage.getItem('userArea');
        if(savedArea) applyAreaSettings(savedArea);
        
        const savedGoal = localStorage.getItem('myPersonalGoal');
        if(savedGoal) document.getElementById('my-goal-input').value = savedGoal;
    };
</script>
</body>
</html>
