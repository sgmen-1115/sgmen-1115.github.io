<head>

  <meta property="og:title" content="創価学会男子部公式サイト" />
  <meta property="og:description" content="日頃の活動をサポートする公式ページです。" />
  <meta property="og:url" content="https://sgmen-1115.github.io/" />
  <meta property="og:image" content="https://sgmen-1115.github.io/ogp.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="創価学会男子部公式サイト" />
  <meta name="twitter:description" content="日頃の活動をサポートする公式ページです。" />
  <meta name="twitter:image" content="https://sgmen-1115.github.io/ogp.jpg" />

  <link rel="manifest" href="/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="男子部アプリ" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&display=swap" rel="stylesheet" />

  <style>
    /* ===== 変数 ===== */
    :root {
      --primary-color: #003366;
      --white: #ffffff;
      --header-h: 56px;
      --tab-h: 64px;
      --text-blue: #17325f;
      --hero-image: url("title_pic.jpg");
      --card-max-w: 800px;
    }

    /* ===== リセット ===== */
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding-top: var(--header-h);
      padding-bottom: calc(74px + env(safe-area-inset-bottom));
      color: var(--text-blue);
      font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", sans-serif;
      background: linear-gradient(180deg, #7ca2ef 0%, #4f78cc 48%, #2d4ea1 100%);
      background-attachment: fixed;
    }

    /* ===== ヘッダー ===== */
    .fixed-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: var(--header-h);
      z-index: 3000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: rgba(25, 42, 92, 0.22);
      backdrop-filter: blur(8px);
    }

    .fixed-header h1 {
      margin: 0;
      font-family: "Cinzel", serif;
      font-size: clamp(0.76rem, 1.7vw, 0.95rem);
      font-weight: 600;
      letter-spacing: 0.1em;
      line-height: 1;
      color: rgba(245, 249, 255, 0.95);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ===== サブタブ ===== */
    .subtab-menu {
      display: flex;
      flex-direction: row;
      gap: 8px;
      margin: 12px 0 4px;
    }

    .subtab-btn {
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.08);
      color: rgba(245, 249, 255, 0.92);
      border-radius: 999px;
      min-height: 36px;
      padding: 7px 14px;
      font-weight: 700;
      font-size: 0.86rem;
      cursor: pointer;
    }

    .subtab-btn.active {
      background: rgba(255, 255, 255, 0.24);
      border-color: rgba(255, 255, 255, 0.42);
      color: #fff;
    }

    /* ===== タブコンテンツ ===== */
    .tab-content {
      display: none;
      position: relative;
      padding: 20px 16px 40px;
      min-height: calc(100vh - (var(--header-h) + var(--tab-h)));
    }

    .tab-content.active { display: block; }

    .tab-content:not(#home)::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 14%, rgba(255,255,255,0.18), rgba(255,255,255,0) 30%),
        radial-gradient(circle at 84% 12%, rgba(255,255,255,0.10), rgba(255,255,255,0) 26%),
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,0.06) 0,
          rgba(255,255,255,0.06) 1px,
          transparent 1px,
          transparent 26px
        );
      opacity: 0.55;
      pointer-events: none;
    }

    .tab-content:not(#home) > * {
      position: relative;
      z-index: 1;
    }

    /* ===== サブペイン ===== */
    .subpane { display: none; }
    .subpane.active { display: block; }

    /* ===== ホーム ヒーロー ===== */
    .page-visual {
      position: relative;
      min-height: calc(100vh - (var(--header-h) + var(--tab-h)));
      margin: 0;
      padding: 0;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(25,59,143,0.20) 0%, rgba(25,59,143,0.55) 100%),
        var(--hero-image) center bottom / cover no-repeat;
    }

    .page-visual::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 16% 20%, rgba(255,255,255,0.22), transparent 25%),
        radial-gradient(circle at 84% 16%, rgba(210,230,255,0.16), transparent 24%);
      pointer-events: none;
    }

    .hero-container { position: relative; min-height: 58vh; }

    .hero-content {
      position: absolute;
      top: 26px;
      left: 0;
      right: 0;
      z-index: 20;
      padding: 0 20px;
      max-width: 980px;
      margin: 0 auto;
    }

    .hero-title {
      margin: 0;
      font-size: clamp(1.45rem, 3vw, 2.45rem);
      line-height: 1.35;
      letter-spacing: 0.03em;
      color: #f5f9ff;
      font-weight: 500;
      text-shadow: 0 2px 10px rgba(5,20,60,0.35), 0 0 28px rgba(186,214,255,0.28);
    }

    .hero-title::after {
      content: "";
      display: block;
      width: clamp(120px, 20vw, 220px);
      height: 2px;
      margin-top: 16px;
      background: linear-gradient(90deg, rgba(255,255,255,0.85), rgba(255,255,255,0.08));
      border-radius: 999px;
    }

    .hero-title rt { font-size: 0.45em; letter-spacing: 0; }

    /* ===== カード ===== */
    .card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.3);
      margin-bottom: 20px;
      color: #17325f;
    }

    .home-stack {
      padding: 20px;
      max-width: var(--card-max-w);
      margin: 0 auto;
    }

    .countdown-label {
      display: block;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.75);
    }

    .countdown-value {
      font-size: clamp(1.1rem, 4.6vw, 1.8rem);
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      letter-spacing: -0.02em;
    }

    #home .card {
      background: linear-gradient(180deg, rgba(27,57,128,0.58), rgba(18,41,98,0.52));
      border: 1px solid rgba(190,215,255,0.28);
      box-shadow: 0 10px 30px rgba(9,26,71,0.28);
      color: #fff;
      margin-top: -12px;
      position: relative;
      z-index: 8;
    }

    .sub-title {
      display: inline-block;
      background-color: var(--primary-color);
      color: var(--white);
      padding: 6px 20px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: bold;
      margin: 15px 0 10px 0;
    }

    /* ===== 動画（16:9） ===== */
    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      margin: 20px 0;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .video-container iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .video-card-wrap {
      max-width: var(--card-max-w);
    }

    .featured-video-trigger {
      position: relative;
      width: 100%;
      border: 0;
      padding: 0;
      border-radius: 16px;
      overflow: hidden;
      background: #0b1430;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    }

    .featured-video-trigger img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }

    .featured-video-trigger::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(11,20,48,0.06), rgba(11,20,48,0.38));
      pointer-events: none;
    }

    .featured-video-play {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 68px;
      height: 68px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px);
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 28px;
      z-index: 1;
    }

    /* ===== Shorts（縦動画）===== */
    .shorts-row {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 6px 2px 10px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .shorts-card {
      position: relative;
      flex: 0 0 min(180px, 50vw);
      aspect-ratio: 9 / 16;
      border: 0;
      border-radius: 14px;
      overflow: hidden;
      background: #000;
      padding: 0;
      cursor: pointer;
      scroll-snap-align: start;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
    }

    .shorts-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .shorts-play {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 58px;
      height: 58px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      display: grid;
      place-items: center;
      font-size: 24px;
    }

    .shorts-card iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* ===== リンクサムネイル ===== */
    .link-grid {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 6px 2px 10px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }

    .link-thumb {
      flex: 0 0 min(280px, 78vw);
      display: block;
      text-decoration: none;
      color: #17325f;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      scroll-snap-align: start;
    }

    .link-thumb:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12);
    }

    .link-thumb img {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
      background: #dfe8ff;
    }

    .link-thumb .meta {
      padding: 10px 12px;
      font-size: 0.88rem;
      font-weight: 700;
      line-height: 1.4;
    }

    .link-scroll-hint {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 6px;
      color: rgba(255,255,255,0.82);
      font-size: 0.78rem;
      letter-spacing: 0.08em;
    }

    .link-scroll-hint .dots {
      font-size: 0.95rem;
      letter-spacing: 0.22em;
      transform: translateY(-1px);
    }

    .notice-board {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 10px;
    }

    .notice-item {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px 12px;
      align-items: start;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.14);
    }

    .notice-item:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .notice-date {
      font-size: 0.78rem;
      font-weight: 700;
      color: rgba(219, 233, 255, 0.82);
      white-space: nowrap;
    }

    .notice-text {
      margin: 0;
      line-height: 1.7;
      color: #fff;
    }

    /* ===== 学習サムネイル ===== */
    .study-thumb-btn {
      width: 100%;
      border: 0;
      background: #fff;
      border-radius: 14px;
      padding: 0;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      text-align: left;
    }

    .study-thumb-img {
      width: 100%;
      display: block;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: #dfe8ff;
    }

    .study-thumb-caption {
      padding: 10px 12px;
      font-size: 0.9rem;
      font-weight: 700;
      color: #17325f;
    }

    /* ===== 学習モーダル ===== */
    .study-image-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 4000;
      background: rgba(0, 0, 0, 0.72);
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .study-image-modal.open {
      display: flex;
    }

    .study-image-wrap {
      width: min(960px, 96vw);
      max-height: 92vh;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .study-image-full {
      width: 100%;
      max-height: calc(92vh - 52px);
      object-fit: contain;
      border-radius: 12px;
      background: #111;
    }

    .study-image-close {
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ===== 下部固定タブ ===== */
    .bottom-tabbar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 5000;
      height: calc(64px + env(safe-area-inset-bottom));
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      background: rgba(20, 34, 74, 0.94);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255, 255, 255, 0.16);
    }

    .bottom-tab {
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: rgba(235, 242, 255, 0.75);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }

    .bottom-tab svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .bottom-tab.active {
      color: #fff;
      background: rgba(255, 255, 255, 0.12);
    }

    /* ===== レスポンシブ ===== */
    @media (max-width: 768px) {
      .fixed-header { padding: 0 12px; }
      .fixed-header h1 { font-size: 0.72rem; letter-spacing: 0.08em; }
      .shorts-card { flex-basis: 54vw; }
      .link-thumb { flex-basis: 82vw; }
      .subtab-menu {
        overflow-x: auto;
        padding-bottom: 2px;
      }
      .subtab-btn {
        flex: 0 0 auto;
        white-space: nowrap;
      }
      .countdown-value {
        font-size: clamp(1rem, 5vw, 1.28rem);
      }
      .notice-item {
        grid-template-columns: 1fr;
        gap: 4px;
      }
      .link-scroll-hint {
        justify-content: flex-end;
        padding-right: 4px;
      }
    }
  </style>
</head>

<body>
  <!-- ヘッダー -->
  <div class="fixed-header">

  <!-- ホームタブ -->

      <button class="subtab-btn" onclick="openSubTab('study','study-activity',this)" >活動</button>

      <div class="card"><p>活動用の資料をここに配置</p></div>
    </div>
    <div id="study-kyogaku" class="subpane" data-subgroup="study">
      <div class="sub-title">学習資料（教学）</div>
      <div class="card"><p>教学用の資料をここに配置</p></div>
    </div>
  </div>

  <!-- 学習モーダル -->
  <div id="study-image-modal" class="study-image-modal" onclick="closeStudyImage()">
    <div class="study-image-wrap" onclick="event.stopPropagation()">
      <img src="zaimu.png" alt="学習資料" class="study-image-full">
      <button type="button" class="study-image-close" onclick="closeStudyImage()">閉じる</button>
    </div>
  </div>

  <!-- 下部タブ -->
  <nav class="bottom-tabbar" aria-label="メインナビゲーション">
    <button class="bottom-tab active" data-primary="home" onclick="openPrimaryTab('home', this)">
      <svg viewBox="0 0 24 24"><path d="M3 10.5L12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      <span>ホーム</span>
    </button>
    <button class="bottom-tab" data-primary="videos" onclick="openPrimaryTab('videos', this)">
      <svg viewBox="0 0 24 24"><rect x="3" y="5" width="14" height="14" rx="2"/><path d="M17 10l4-2v8l-4-2z"/></svg>
      <span>動画</span>
    </button>
    <button class="bottom-tab" data-primary="study" onclick="openPrimaryTab('study', this)">
      <svg viewBox="0 0 24 24"><path d="M4 6.5A3.5 3.5 0 0 1 7.5 3H20v16.5h-12A3.5 3.5 0 0 0 4.5 23"/><path d="M20 3v16.5"/></svg>
      <span>学習</span>
    </button>
  </nav>

  <script>
    // ===== タブ切替 =====
    function openPrimaryTab(tabId, btn) {
      document.querySelectorAll(".tab-content").forEach((el) => el.classList.remove("active"));
      document.querySelectorAll(".bottom-tab").forEach((el) => el.classList.remove("active"));

      const target = document.getElementById(tabId);
      if (target) target.classList.add("active");
      if (btn) btn.classList.add("active");
    }

    // ===== サブタブ切替 =====
    function openSubTab(group, paneId, btn) {
      document.querySelectorAll('[data-subgroup="' + group + '"]').forEach((el) => el.classList.remove("active"));
      document.getElementById(paneId).classList.add("active");
      btn.parentElement.querySelectorAll(".subtab-btn").forEach((el) => el.classList.remove("active"));
      btn.classList.add("active");
    }

    // ===== 学習モーダル =====
    function openStudyImage() {
      document.getElementById("study-image-modal").classList.add("open");
    }

    function closeStudyImage() {
      document.getElementById("study-image-modal").classList.remove("open");
    }

    // ===== Shorts タップで再生 =====
    document.querySelectorAll(".js-short").forEach((card) => {
      card.addEventListener("click", () => {
        const id = card.dataset.id;
        const iframe = document.createElement("iframe");
        iframe.src = "https://www.youtube.com/embed/" + id + "?autoplay=1&playsinline=1";
        iframe.allow = "autoplay; encrypted-media";
        iframe.allowFullscreen = true;
        card.innerHTML = "";
        card.appendChild(iframe);
      });
    });

    document.querySelectorAll(".js-featured-video").forEach((card) => {
      card.addEventListener("click", () => {
        const id = card.dataset.id;
        const start = card.dataset.start || "0";
        const iframe = document.createElement("iframe");
        iframe.src = "https://www.youtube.com/embed/" + id + "?autoplay=1&playsinline=1&start=" + start + "&rel=0";
        iframe.allow = "autoplay; encrypted-media; picture-in-picture";
        iframe.allowFullscreen = true;
        iframe.title = "おすすめ動画";
        card.innerHTML = "";
        card.appendChild(iframe);
      });
    });

    // ===== カウントダウン =====
    function updateCountdown() {
      const target = new Date("2026-07-11T00:00:00+09:00");
      const diff = target - new Date();
      if (diff <= 0) {
        document.getElementById("timer").textContent = "本日！";
        return;
      }
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      document.getElementById("timer").textContent = `あと ${d}日 ${h}時間 ${m}分 ${s}秒`;
    }
    setInterval(updateCountdown, 1000);
    updateCountdown();

    // ===== 初期表示 =====
    window.addEventListener("load", () => {
      const homeBtn = document.querySelector('.bottom-tab[data-primary="home"]');
      openPrimaryTab("home", homeBtn);
    });
  </script>
</body>
</html>
